<meta charset="utf-8">
<title>Stan & Sandra's Dashboard — Elevate Teams</title>
<style>
  :root {
    --blue: #2E5CFB; --blue-fade: rgba(46,92,251,0.10); --blue-border: rgba(46,92,251,0.22);
    --yellow: #F1C834; --yellow-fade: rgba(241,200,52,0.14);
    --navy: #071E24; --navy-2: #0d2b33; --navy-line: #1a3540; --navy-sub: #8fa4a0;
    --cream: #F4F0ED; --sand: #EADCD1; --sand-border: #d4c9be;
    --orange: #F56B3F; --orange-fade: rgba(245,107,63,0.10); --orange-border: rgba(245,107,63,0.25);
    --purple: #AE47FF; --purple-fade: rgba(174,71,255,0.10); --purple-border: rgba(174,71,255,0.25);
    --green: #38B238; --green-fade: rgba(56,178,56,0.10); --green-border: rgba(56,178,56,0.25);
    --red: #FF4847; --red-fade: rgba(255,72,71,0.10); --red-border: rgba(255,72,71,0.25);
    --white: #FFFFFF; --mid-text: #5b7280; --line: #e0d8d0;
    --radius: 10px; --shadow: 0 1px 4px rgba(7,30,36,0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    background: var(--cream); color: var(--navy);
    font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "SF Mono", "Cascadia Code", Consolas, monospace; font-variant-numeric: tabular-nums; }
  a { color: inherit; }
  button { font-family: inherit; }
  input, select, textarea, button { font-family: inherit; }
  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--blue); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* ---------- header ---------- */
  .hdr { background: var(--navy); padding: 18px 24px 0; position: sticky; top: 0; z-index: 100; }
  .hdr-inner { max-width: 1100px; margin: 0 auto; }
  .hdr-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 14px; padding-bottom: 14px; }
  .brand-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .brand-badge { display: flex; align-items: center; gap: 6px; background: var(--yellow); color: var(--navy); font-size: 10px; letter-spacing: 0.06em; padding: 2px 9px 2px 3px; border-radius: 20px; font-weight: 800; }
  .brand-badge img { width: 18px; height: 18px; display: block; border-radius: 50%; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--navy-sub); }
  .hdr-date { font-size: 10px; color: var(--navy-sub); }
  .save-dot { font-size: 9px; margin-left: 2px; }
  .save-saved { color: var(--green); } .save-saving { color: var(--yellow); } .save-error { color: var(--red); }
  .greet { font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: -0.01em; }
  .habit-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .habit-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--navy-line); background: transparent; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .habit-dot.done { border-color: var(--yellow); background: var(--yellow-fade); }
  .habit-count { font-size: 11px; color: var(--navy-sub); font-weight: bold; }
  .habit-count.full { color: var(--yellow); }

  .stat-bars { display: flex; flex-wrap: wrap; border-top: 1px solid var(--navy-line); }
  .stat-bar { flex: 1 1 110px; min-width: 0; padding: 10px 12px 12px 0; border-right: 1px solid var(--navy-line); }
  .stat-bar:first-child { padding-left: 0; }
  .stat-bar:last-child { border-right: none; }
  .stat-bar-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .stat-bar-label { font-size: 8px; color: var(--navy-sub); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
  .stat-bar-val { font-size: 9px; font-weight: bold; }
  .stat-track { height: 3px; background: var(--navy-line); border-radius: 2px; overflow: hidden; }
  .stat-fill { height: 100%; border-radius: 2px; }

  /* ---------- tabs ---------- */
  .tabbar { background: var(--white); border-bottom: 1px solid var(--line); overflow-x: auto; position: sticky; top: 106px; z-index: 99; box-shadow: 0 2px 8px rgba(7,30,36,0.06); }
  .tabbar-inner { max-width: 1100px; margin: 0 auto; display: flex; min-width: max-content; padding: 0 24px; }
  .tab-btn { padding: 12px 15px; background: transparent; border: none; border-bottom: 3px solid transparent; color: var(--mid-text); font-size: 11px; cursor: pointer; font-weight: 500; letter-spacing: 0.04em; white-space: nowrap; text-transform: uppercase; }
  .tab-btn.active { border-bottom-color: var(--blue); color: var(--blue); font-weight: 800; }

  .content { max-width: 1100px; margin: 0 auto; padding: 24px 24px 120px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } .hdr-top { flex-direction: column; } .stat-bars { flex-wrap: wrap; } .stat-bar { flex: 1 1 40%; } }

  /* ---------- section header ---------- */
  .sec-head { font-size: 10px; color: var(--mid-text); letter-spacing: 0.13em; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; }
  .sec-head .count { font-family: "SF Mono", Consolas, monospace; font-size: 11px; }

  /* ---------- tag ---------- */
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: "SF Mono", Consolas, monospace; white-space: nowrap; flex-shrink: 0; font-weight: bold; border: 1px solid transparent; }

  /* ---------- add-item card ---------- */
  .add-card { background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-row input[type="text"], .add-row input:not([type]), .add-row select, .add-row input[type="date"] {
    background: var(--cream); border: 1.5px solid var(--line); border-radius: 8px; padding: 9px 11px; color: var(--navy); font-size: 13px; outline: none;
  }
  .add-row .grow { flex: 1 1 160px; }
  .add-row .med { flex: 0 1 130px; font-size: 12px; }
  .add-btn { border: none; border-radius: 8px; padding: 0 16px; color: var(--white); font-weight: 700; font-size: 12px; cursor: pointer; min-height: 38px; }
  .add-hint { font-size: 10px; color: var(--mid-text); margin-top: 7px; }

  .show-completed-btn { background: transparent; border: 1.5px solid var(--line); border-radius: 20px; padding: 5px 14px; color: var(--mid-text); font-size: 11px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }

  /* ---------- card ---------- */
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .empty-msg { font-size: 12px; color: var(--mid-text); padding: 14px 4px; text-align: center; }
  .card { background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .card.done { background: var(--green-fade); border-color: var(--green-border); box-shadow: none; }
  .card-main { padding: 13px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .card-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1 1 auto; }
  .check { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 2px solid var(--sand-border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--white); font-weight: bold; }
  .check.done { border-color: var(--green); background: var(--green); }
  .card-text { font-size: 13px; font-weight: 600; color: var(--navy); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-text.done { color: var(--mid-text); text-decoration: line-through; }
  .card-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .icon-btn { background: transparent; border: none; color: var(--mid-text); cursor: pointer; font-size: 10px; font-weight: 700; padding: 3px 5px; display: flex; align-items: center; gap: 3px; }
  .icon-btn .chev { font-size: 9px; transition: transform .15s; }
  .icon-btn.open .chev { transform: rotate(180deg); }
  .del-btn { background: transparent; border: none; color: var(--sand-border); cursor: pointer; font-size: 14px; }
  .card-body { padding: 0 14px 16px; border-top: 1px solid var(--line); }
  .field-label { font-size: 9px; color: var(--mid-text); letter-spacing: 0.11em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; margin-top: 16px; }
  .field-label:first-child { margin-top: 14px; }
  .linked-note { margin-top: 14px; font-size: 11px; color: var(--mid-text); background: var(--blue-fade); border: 1px solid var(--blue-border); border-radius: 8px; padding: 8px 10px; }
  .move-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .move-row select, .move-row input { background: var(--white); border: 1.5px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 11px; color: var(--navy); outline: none; }
  .move-row .go-btn { background: var(--navy); border: none; border-radius: 8px; padding: 0 12px; color: var(--white); font-weight: 700; font-size: 11px; cursor: pointer; min-height: 30px; }
  .chip-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--line); background: var(--white); color: var(--mid-text); }
  .chip.active { background: var(--blue-fade); border-color: var(--blue-border); color: var(--blue); }
  .micro-hint { font-size: 9.5px; color: var(--mid-text); margin-top: 6px; }
  .link-row-item, .comment-item { background: var(--cream); border-radius: 8px; }
  .link-row-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 10px; }
  .link-row-item a { font-size: 12px; color: var(--blue); font-weight: 600; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comment-item { padding: 8px 11px; }
  .comment-top { display: flex; justify-content: space-between; gap: 8px; }
  .comment-text { font-size: 12px; color: var(--navy); line-height: 1.4; }
  .comment-time { font-size: 9px; color: var(--mid-text); margin-top: 4px; }
  .stack-gap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .inline-form { display: flex; gap: 6px; flex-wrap: wrap; }
  .inline-form input { flex: 1 1 150px; background: var(--white); border: 1.5px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 11px; color: var(--navy); outline: none; }
  .inline-form input.short { flex: 0 1 120px; }
  .inline-form button { border: none; border-radius: 8px; padding: 0 12px; color: var(--white); font-weight: 700; font-size: 11px; cursor: pointer; min-height: 30px; }

  .bucket-label { font-size: 9px; letter-spacing: 0.11em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }

  /* ---------- win of the day / affirmation ---------- */
  textarea.win { width: 100%; background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 12px 14px; color: var(--navy); font-size: 13px; outline: none; resize: none; height: 64px; }
  textarea.win:focus { border-color: var(--yellow); }
  .affirmation { margin-top: 24px; background: var(--navy); border-radius: 12px; padding: 20px; border: 2px solid var(--blue); }
  .affirmation-label { font-size: 10px; color: var(--blue); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; }
  .affirmation-text { font-size: 17px; color: var(--white); font-weight: 700; line-height: 1.4; }
  .affirmation-sub { font-size: 11px; color: var(--navy-sub); margin-top: 8px; }

  /* ---------- habits grid ---------- */
  .habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .habit-card { background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 11px 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .habit-card.done { background: var(--green-fade); border-color: var(--green-border); }
  .habit-card .emoji { font-size: 18px; }
  .habit-card .label { font-size: 12px; font-weight: 500; color: var(--mid-text); }
  .habit-card.done .label { font-weight: 700; color: var(--green); }
  .habit-card .mark { margin-left: auto; color: var(--green); }

  /* ---------- weekly summary ---------- */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary-row { background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 11px 13px; display: flex; align-items: center; justify-content: space-between; }
  .summary-row .name { font-size: 12px; font-weight: 600; }
  .summary-row .num { font-size: 13px; font-weight: 800; }

  /* ---------- reminders widget ---------- */
  .rw-item { background: var(--white); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 11px 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
  .rw-item.overdue { border-color: rgba(255,72,71,0.35); }
  .rw-check { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 2px solid var(--sand-border); }
  .rw-text { flex: 1; font-size: 12px; font-weight: 600; color: var(--navy); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .view-all-btn { margin-top: 12px; background: transparent; border: 1.5px solid var(--line); border-radius: 20px; padding: 6px 14px; color: var(--mid-text); font-size: 11px; font-weight: 700; cursor: pointer; }

  .sandra-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
  .sandra-toggle button { border-radius: 20px; padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--line); background: var(--white); color: var(--mid-text); }
  .sandra-toggle button.on-tasks { background: var(--blue); color: var(--white); border-color: var(--blue); }
  .sandra-toggle button.on-reminders { background: var(--yellow); color: var(--navy); border-color: var(--yellow); }

  /* ---------- chat ---------- */
  .chat-fab { position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; border-radius: 50%; background: var(--blue); border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(46,92,251,0.4); z-index: 200; color: var(--white); }
  .chat-panel { position: fixed; bottom: 94px; right: 28px; width: 340px; max-width: calc(100vw - 32px); background: var(--white); border: 1.5px solid var(--line); border-radius: 16px; overflow: hidden; z-index: 199; box-shadow: 0 8px 40px rgba(7,30,36,0.18); display: flex; flex-direction: column; max-height: 440px; }
  .chat-head { padding: 12px 16px; background: var(--navy); border-bottom: 3px solid var(--blue); }
  .chat-head .title { font-size: 10px; color: var(--blue); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 800; }
  .chat-head .sub { font-size: 11px; color: var(--navy-sub); margin-top: 1px; }
  .chat-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 120px; }
  .msg { padding: 8px 12px; border-radius: 10px; font-size: 12px; max-width: 85%; line-height: 1.45; font-weight: 500; }
  .msg.user { align-self: flex-end; background: var(--blue); color: var(--white); }
  .msg.assistant { align-self: flex-start; background: var(--cream); color: var(--navy); }
  .chat-input-row { padding: 10px 10px 6px; border-top: 1px solid var(--line); display: flex; gap: 8px; }
  .chat-input-row input { flex: 1; background: var(--cream); border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 11px; color: var(--navy); font-size: 12px; outline: none; }
  .chat-send { background: var(--blue); border: none; border-radius: 8px; padding: 0 12px; color: var(--white); font-weight: bold; cursor: pointer; font-size: 15px; }
  .chat-foot { padding: 0 10px 10px; font-size: 9.5px; color: var(--mid-text); line-height: 1.4; }

  .loading-screen { min-height: 100vh; background: var(--cream); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--blue); border-top-color: transparent; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

    } else if (/\bsomeday|\bnot now|\blow priority|\bpark it|\breal but not now\b/.test(lower)) {
      section = "parkingLot";
    } else if (/\bread\b|\bbook\b|\barticle\b|\bwatch\b|\bpodcast episode\b/.test(lower)) {
      section = "readingList";
    } else if (/\bannual goal|\bthis year\b|\byearly\b/.test(lower)) {
      section = "annualGoals";
    } else if (/\bbusiness\b|\bpodcast\b|\bclient\b|\bsale\b|\bmarketing\b|\bwebsite\b/.test(lower)) {
      section = "businessPriorities";
      extra.category = guessCategory("businessPriorities", text);
    } else if (/\bpersonal\b|\bfamily\b|\bhealth\b|\bhome\b|\bhouse\b/.test(lower)) {
      section = "personal";
      extra.category = guessCategory("personal", text);
    } else if (/\bby friday|\bbefore the weekend|\bthis week\b/.test(lower)) {
      section = "thisWeek";
    } else {
      replyNote = " (nothing matched strongly — filed under This Week, move it if that's not right)";
    }

    var cfg = SECTION_CONFIG[section];
    if (cfg.requireDeadline && !deadline) { deadline = isoOf(addDays(new Date(), 3)); replyNote = replyNote || " (no date mentioned, set 3 days out)"; }

    var task = Object.assign({ id: uid(), text: cleanTaskText(text, section), done: false, deadline: deadline || null, comments: [], links: [], linkedTo: [] }, extra);
    data[section] = data[section].concat([task]);

    var extraBit = extra.to ? " → " + extra.to : extra.who ? " (waiting on " + extra.who + ")" : extra.category ? " [" + extra.category + "]" : "";
    var dueBit = deadline ? " — due " + formatDeadline(deadline) : "";
    return "Added to " + cfg.title + extraBit + dueBit + "." + replyNote;
  }

  function sendChat(userText) {

    ui.chatMessages.push({ role: "user", text: userText.trim() });

    setTimeout(function () {

  function renderTaskSection(section) {
    var cfg = SECTION_CONFIG[section];
    var nativeEntries = (data[section] || []).map(function (i) { return { item: i, home: section }; });
    var foreignEntries = [];
    Object.keys(SECTION_CONFIG).filter(function (s) { return s !== section; }).forEach(function (s) {
      (data[s] || []).filter(function (i) { return (i.linkedTo || []).indexOf(section) >= 0; }).forEach(function (i) { foreignEntries.push({ item: i, home: s }); });
    });
    var allEntries = nativeEntries.concat(foreignEntries);
    var openEntries = allEntries.filter(function (e) { return !e.item.done; });
    var doneEntries = allEntries.filter(function (e) { return e.item.done; });
    var show = !!ui.showCompleted[section];
    var todayISO = getTodayISO();

    var html = '<div class="sec-head"><span>' + esc(cfg.title) + '</span><span class="count" style="color:' + cfg.color + '">' + allEntries.length + "</span></div>";
    html += renderAddForm(section);
    if (doneEntries.length > 0) html += '<button class="show-completed-btn" data-action="toggle-completed" data-section="' + section + '">' + (show ? "Hide" : "Show") + " completed (" + doneEntries.length + ")</button>";

    if (section === "reminders") {
      var overdue = openEntries.filter(function (e) { return e.item.deadline && e.item.deadline < todayISO; }).sort(function (a, b) { return a.item.deadline < b.item.deadline ? -1 : 1; });
      var dueToday = openEntries.filter(function (e) { return e.item.deadline === todayISO; });
      var upcoming = openEntries.filter(function (e) { return e.item.deadline && e.item.deadline > todayISO; }).sort(function (a, b) { return a.item.deadline < b.item.deadline ? -1 : 1; });
      var noDate = openEntries.filter(function (e) { return !e.item.deadline; });
      function bucket(label, color, entries) {
        if (!entries.length) return "";
        var h = '<div style="margin-bottom:18px"><div class="bucket-label" style="color:' + color + '">' + label + " (" + entries.length + ')</div><div class="card-list">';
        entries.forEach(function (e) { h += renderTaskCard(e.home, e.item, section); });
        return h + "</div></div>";
      }
      if (allEntries.length === 0) html += '<div class="empty-msg">No reminders set. Add one above.</div>';
      html += bucket("Overdue", "#ff4847", overdue);
      html += bucket("Today", ET.yellow, dueToday);
      html += bucket("Upcoming", ET.blue, upcoming);
      html += bucket("No Date", ET.midText, noDate);
      if (show && doneEntries.length > 0) {
        html += '<div><div class="bucket-label" style="color:' + ET.green + '">Completed (' + doneEntries.length + ')</div><div class="card-list">';
        doneEntries.forEach(function (e) { html += renderTaskCard(e.home, e.item, section); });
        html += "</div></div>";
      }
    } else {
      html += '<div class="card-list">';
      if (allEntries.length === 0) html += '<div class="empty-msg">Nothing here yet. Add one above.</div>';
      if (allEntries.length > 0 && openEntries.length === 0 && doneEntries.length > 0 && !show) html += '<div class="empty-msg">All done. Tap "Show completed" to review.</div>';
      openEntries.forEach(function (e) { html += renderTaskCard(e.home, e.item, section); });
      if (show) doneEntries.forEach(function (e) { html += renderTaskCard(e.home, e.item, section); });
      html += "</div>";
    }
    return html;
  }

  function renderTodayRemindersWidget() {
    var todayISO = getTodayISO();
    var due = (data.reminders || []).filter(function (i) { return !i.done && i.deadline && i.deadline <= todayISO; }).sort(function (a, b) { return a.deadline < b.deadline ? -1 : 1; });
    var html = '<div class="sec-head"><span>Reminders — Today</span><span class="count" style="color:' + ET.yellow + '">' + due.length + "</span></div>";
    if (due.length === 0) html += '<div class="empty-msg">Nothing due today. 🎉</div>';
    due.forEach(function (item) {
      var overdue = item.deadline < todayISO;
      html += '<div class="rw-item' + (overdue ? " overdue" : "") + '" data-action="toggle-done" data-section="reminders" data-id="' + item.id + '" style="margin-bottom:8px">';
      html += '<div class="rw-check"></div><div class="rw-text">' + esc(item.text) + "</div>";
      if (overdue) html += tag("Overdue", "#ff4847", "rgba(255,72,71,0.10)", "rgba(255,72,71,0.25)");
      html += "</div>";
    });
    html += '<button class="view-all-btn" data-action="sandra-view" data-view="reminders">🔔 View all reminders</button>';
    return html;
  }

  function renderWeeklySummary() {
    var now = Date.now(), weekMs = 7 * 24 * 60 * 60 * 1000;
    var rows = LIST_SECTIONS.map(function (key) {
      var items = data[key] || [];
      var count = items.filter(function (i) { return i.done && i.completedAt && (now - new Date(i.completedAt).getTime()) <= weekMs; }).length;
      return { key: key, title: SECTION_CONFIG[key].title, color: SECTION_CONFIG[key].color, count: count };
    });
    var total = rows.reduce(function (s, r) { return s + r.count; }, 0);
    var html = '<div style="margin-top:32px"><div class="sec-head"><span>Weekly Summary — Completed Across All Tabs</span><span class="count" style="color:' + ET.green + '">' + total + "</span></div><div class=\"summary-grid\">";
    rows.forEach(function (r) {
      html += '<div class="summary-row"><span class="name">' + esc(r.title) + '</span><span class="num" style="color:' + (r.count > 0 ? r.color : "#d4c9be") + '">' + r.count + "</span></div>";
    });
    html += '</div><div class="add-hint">Counts items marked done in the last 7 days. Un-completing something removes it from this count.</div></div>';
    return html;
  }

    html += "</div>";

    html += '<button class="chat-fab" data-action="toggle-chat">' + (ui.showChat ? "✕" : "💬") + "</button>";
    if (ui.showChat) {
      html += '<div class="chat-panel"><div class="chat-head"><div class="title">Chief of Staff (keyword mode)</div><div class="sub">Tell me what to update</div></div>';
      html += '<div class="chat-body">';
      ui.chatMessages.forEach(function (msg) { html += '<div class="msg ' + msg.role + '">' + esc(msg.text) + "</div>"; });
      if (ui.isThinking) html += '<div class="msg assistant">thinking...</div>';
      html += "</div>";
      html += '<div class="chat-input-row"><input id="chat-input" placeholder="e.g. \'reassign the Apollo review to Ana\' or \'this is due Friday\'..." value="">';
      html += '<button class="chat-send" data-action="send-chat"' + (ui.isThinking ? " disabled" : "") + ">→</button></div>";
      html += '<div class="chat-foot">💡 Best way to talk instead of type: use your keyboard\'s dictation button while this box is focused.</div>';
      html += "</div>";
    }

    root.innerHTML = html;
    var body = document.querySelector(".chat-body");
    if (body) body.scrollTop = body.scrollHeight;
  }

  /* ================= event wiring ================= */
  function onClick(e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.getAttribute("data-action");
    var section = el.getAttribute("data-section");
    var id = el.getAttribute("data-id") ? Number(el.getAttribute("data-id")) : null;

    if (action === "toggle-habit") toggleHabit(id);
    else if (action === "toggle-done") toggleDone(section, id);
    else if (action === "toggle-expand") toggleExpand(section, id);
    else if (action === "delete-item") { e.stopPropagation(); removeItem(section, id); }
    else if (action === "unlink") { e.stopPropagation(); toggleLinkedTo(section, id, el.getAttribute("data-display")); }
    else if (action === "add-task") addTaskToSection(section);
    else if (action === "move-item") moveItem(section, id);
    else if (action === "toggle-linked") toggleLinkedTo(section, id, el.getAttribute("data-target"));
    else if (action === "add-comment") addComment(section, id);
    else if (action === "remove-comment") removeComment(section, id, Number(el.getAttribute("data-comment-id")));
    else if (action === "add-link") addLink(section, id);
    else if (action === "remove-link") removeLink(section, id, Number(el.getAttribute("data-link-id")));
    else if (action === "toggle-completed") toggleShowCompleted(section);
    else if (action === "set-tab") { ui.activeTab = el.getAttribute("data-tab"); render(); }
    else if (action === "sandra-view") { ui.sandraView = el.getAttribute("data-view"); if (ui.activeTab !== "sandra") ui.activeTab = "sandra"; render(); }
    else if (action === "toggle-chat") { ui.showChat = !ui.showChat; render(); if (ui.showChat) { var inp = document.getElementById("chat-input"); if (inp) inp.focus(); } }
    else if (action === "send-chat") { var box = document.getElementById("chat-input"); if (box) { sendChat(box.value); box.value = ""; } }
  }

  function onInput(e) {
    var el = e.target;
    var action = el.getAttribute("data-action");
    if (!action) return;
    var section = el.getAttribute("data-section");
    var id = el.getAttribute("data-id") ? Number(el.getAttribute("data-id")) : null;
    var k = id !== null ? keyOf(section, id) : null;

    if (action === "draft-text") draft(section).text = el.value;
    else if (action === "draft-extra") draft(section).extraText = el.value;
    else if (action === "draft-custom") draft(section).customAssignee = el.value;
    else if (action === "draft-deadline") draft(section).deadline = el.value;
    else if (action === "move-extra") mDraft(k).extraText = el.value;
    else if (action === "move-custom") mDraft(k).customAssignee = el.value;
    else if (action === "move-deadline") mDraft(k).deadline = el.value;
    else if (action === "comment-text") commentDrafts[k] = el.value;
    else if (action === "link-url") { linkDrafts[k] = linkDrafts[k] || {}; linkDrafts[k].url = el.value; }
    else if (action === "link-label") { linkDrafts[k] = linkDrafts[k] || {}; linkDrafts[k].label = el.value; }
    else if (el.id === "win-of-day") { data.winOfDay = el.value; save(); }
  }

  function onChange(e) {
    var el = e.target;
    var action = el.getAttribute("data-action");
    if (!action) return;
    var section = el.getAttribute("data-section");
    var id = el.getAttribute("data-id") ? Number(el.getAttribute("data-id")) : null;
    var k = id !== null ? keyOf(section, id) : null;

    if (action === "draft-assignee") { draft(section).assignee = el.value; render(); }
    else if (action === "move-target") { mDraft(k).target = el.value; render(); }
    else if (action === "move-assignee") { mDraft(k).assignee = el.value; render(); }
  }

  function onKeydown(e) {
    if (e.key !== "Enter") return;
    var el = e.target;
    var action = el.getAttribute("data-action");
    if (action === "draft-text" || action === "draft-extra" || action === "draft-custom") addTaskToSection(el.getAttribute("data-section"));
    else if (action === "comment-text") { var s = el.getAttribute("data-section"), i = Number(el.getAttribute("data-id")); addComment(s, i); }
    else if (action === "link-url" || action === "link-label") { var s2 = el.getAttribute("data-section"), i2 = Number(el.getAttribute("data-id")); addLink(s2, i2); }
    else if (el.id === "chat-input") { e.preventDefault(); sendChat(el.value); el.value = ""; }
  }

  document.addEventListener("click", onClick);
  document.addEventListener("input", onInput);
  document.addEventListener("change", onChange);
  document.addEventListener("keydown", onKeydown);
  load().then(function () { render(); startPolling(); });
})();
</script>

</body></html>
